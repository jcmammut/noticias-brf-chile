<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Noticias Banca & Retail Financiero — Chile</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117; --surface: #1a1d27; --surface2: #22263a; --border: #2e3350;
      --accent: #3b82f6; --accent-glow: rgba(59,130,246,0.15);
      --green: #22c55e; --green-bg: rgba(34,197,94,0.08);
      --muted: #4b5563; --text: #e2e8f0; --text-dim: #94a3b8;
      --today-border: #f59e0b; --today-bg: rgba(245,158,11,0.08);
      --active-border: #3b82f6; --active-bg: rgba(59,130,246,0.08);
      --radius: 10px;
    }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; padding-bottom: 60px; }

    /* ── Header ── */
    header { background: linear-gradient(135deg, #0d1b3e 0%, #1a2744 60%, #0f1117 100%); border-bottom: 1px solid var(--border); padding: 22px 24px 18px; text-align: center; }
    header h1 { font-size: 1.35rem; font-weight: 700; color: #fff; }
    .tag { display: inline-block; background: var(--accent-glow); border: 1px solid rgba(59,130,246,0.3); color: #60a5fa; font-size: 0.68rem; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; padding: 2px 8px; border-radius: 99px; margin-left: 8px; vertical-align: middle; }
    header p { color: var(--text-dim); font-size: 0.8rem; margin-top: 5px; }

    /* ── Week nav ── */
    .week-nav { display: flex; align-items: center; justify-content: center; gap: 14px; padding: 16px 24px 8px; }
    .week-nav button { background: var(--surface); border: 1px solid var(--border); color: var(--text-dim); padding: 6px 16px; border-radius: 8px; cursor: pointer; font-size: 0.83rem; transition: all 0.15s; }
    .week-nav button:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
    .week-nav button:disabled { opacity: 0.25; cursor: default; }
    #week-label { font-size: 1rem; font-weight: 700; color: var(--text); min-width: 200px; text-align: center; }

    /* ── 7-day calendar strip ── */
    .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; max-width: 900px; margin: 8px auto 0; padding: 0 16px; }

    .day-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 8px;
      min-height: 88px;
      display: flex; flex-direction: column; gap: 4px;
      position: relative;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .day-card.is-today  { border-color: var(--today-border); background: var(--today-bg); }
    .day-card.has-news  { border-color: rgba(34,197,94,0.4); background: var(--green-bg); cursor: pointer; }
    .day-card.has-news:hover { border-color: var(--green); box-shadow: 0 0 16px rgba(34,197,94,0.12); }
    .day-card.is-active { border-color: var(--active-border) !important; background: var(--active-bg) !important; box-shadow: 0 0 20px var(--accent-glow); }
    .day-card.is-future { opacity: 0.3; pointer-events: none; }
    .day-card.is-weekend:not(.has-news):not(.is-today) { opacity: 0.5; }

    .day-card.is-today::after { content: 'HOY'; position: absolute; top: 6px; right: 7px; font-size: 0.55rem; font-weight: 800; letter-spacing: 0.08em; color: var(--today-border); }

    .day-name { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-dim); }
    .day-num  { font-size: 1.4rem; font-weight: 700; line-height: 1; color: var(--text); }
    .day-month { font-size: 0.65rem; color: var(--text-dim); }
    .day-status { margin-top: auto; font-size: 0.72rem; }

    .spinner { display: inline-block; width: 10px; height: 10px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .status-news  { color: var(--green); font-weight: 600; }
    .status-empty { color: var(--muted); }
    .status-future { color: var(--muted); font-style: italic; font-size: 0.65rem; }

    /* ── News section ── */
    .news-section { max-width: 860px; margin: 24px auto 0; padding: 0 16px; }

    .news-section-header {
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
      padding-bottom: 14px; margin-bottom: 20px;
    }
    .news-section-header h2 { font-size: 1rem; font-weight: 700; color: var(--text); }
    .meta-count { background: var(--accent-glow); border: 1px solid rgba(59,130,246,0.3); color: #60a5fa; font-size: 0.73rem; font-weight: 600; padding: 3px 10px; border-radius: 99px; }
    .meta-time { font-size: 0.73rem; color: var(--muted); }

    /* ── News cards (same as daily pages) ── */
    .category-title { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.09em; text-transform: uppercase; color: var(--text-dim); border-bottom: 1px solid var(--border); padding-bottom: 8px; margin-bottom: 14px; margin-top: 28px; }
    .category-title:first-child { margin-top: 0; }
    .news-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 20px; margin-bottom: 10px; display: grid; grid-template-columns: 1fr auto; gap: 12px; align-items: start; transition: border-color 0.15s, box-shadow 0.15s; }
    .news-card:hover { border-color: var(--accent); box-shadow: 0 0 20px var(--accent-glow); }
    .news-title   { font-size: 0.95rem; font-weight: 600; color: var(--text); line-height: 1.4; margin-bottom: 6px; }
    .news-summary { font-size: 0.82rem; color: var(--text-dim); line-height: 1.6; margin-bottom: 10px; }
    .news-meta    { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .news-source  { font-size: 0.72rem; font-weight: 600; color: #60a5fa; background: var(--accent-glow); border: 1px solid rgba(59,130,246,0.25); padding: 2px 8px; border-radius: 99px; }
    .news-time    { font-size: 0.72rem; color: var(--muted); }
    .news-link    { white-space: nowrap; align-self: center; }
    .news-link a  { display: inline-flex; align-items: center; background: var(--surface2); border: 1px solid var(--border); color: var(--text-dim); font-size: 0.78rem; font-weight: 500; padding: 6px 14px; border-radius: 8px; text-decoration: none; transition: all 0.15s; }
    .news-link a:hover { border-color: var(--accent); color: var(--accent); }
    .news-link a::after { content: ' ↗'; font-size: 0.7rem; }

    /* states */
    .news-loading { display: flex; align-items: center; gap: 10px; color: var(--text-dim); font-size: 0.85rem; padding: 32px 0; }
    .news-empty   { color: var(--muted); font-size: 0.85rem; padding: 32px 0; text-align: center; }

    footer { text-align: center; color: var(--muted); font-size: 0.72rem; margin-top: 48px; }

    @media (max-width: 640px) {
      .calendar { gap: 5px; }
      .day-card { min-height: 72px; padding: 8px 6px; }
      .day-num { font-size: 1.1rem; }
    }
  </style>
</head>
<body>

<header>
  <h1>🇨🇱 Noticias Banca &amp; Retail Financiero<span class="tag">Chile</span></h1>
  <p>Resumen diario · actualizado cada mañana a las 8:00 AM</p>
</header>

<div class="week-nav">
  <button id="btn-prev" onclick="changeWeek(-1)">← Semana anterior</button>
  <span id="week-label">—</span>
  <button id="btn-next" onclick="changeWeek(1)">Semana siguiente →</button>
</div>

<div class="calendar" id="calendar"></div>

<div class="news-section" id="news-section">
  <div class="news-loading"><span class="spinner"></span> Cargando noticias…</div>
</div>

<footer><p>Generado automáticamente · fuentes: medios digitales públicos</p></footer>

<script>
  const DAYS_ES   = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const MONTHS_ES = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const MONTHS_FULL = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

  // ── Minimum week: week containing June 1, 2026 ──
  const MIN_DATE = new Date(2026, 5, 1); // June 1 2026
  MIN_DATE.setHours(0,0,0,0);

  function pad(n) { return String(n).padStart(2,'0'); }
  function toISO(d) { return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
  function weekStart(d) {
    const day = d.getDay();
    const diff = (day === 0) ? -6 : 1 - day;
    const m = new Date(d); m.setDate(m.getDate() + diff); m.setHours(0,0,0,0);
    return m;
  }

  const today = new Date(); today.setHours(0,0,0,0);
  const todayISO = toISO(today);
  let currentMonday = weekStart(today);
  let activeISO = null;

  function changeWeek(delta) {
    const next = new Date(currentMonday);
    next.setDate(next.getDate() + delta * 7);
    if (next < weekStart(MIN_DATE)) return;
    currentMonday = next;
    activeISO = null;
    renderWeek();
  }

  async function checkDay(iso) {
    try { const r = await fetch(`./${iso}.html`, { method: 'HEAD' }); return r.ok; }
    catch { return false; }
  }

  async function loadNews(iso) {
    const section = document.getElementById('news-section');
    section.innerHTML = '<div class="news-loading"><span class="spinner"></span> Cargando noticias…</div>';
    activeISO = iso;

    // Highlight active card
    document.querySelectorAll('.day-card').forEach(c => c.classList.remove('is-active'));
    const activeCard = document.querySelector(`[data-iso="${iso}"]`);
    if (activeCard) activeCard.classList.add('is-active');

    try {
      const res  = await fetch(`./${iso}.html`);
      const html = await res.text();
      const doc  = new DOMParser().parseFromString(html, 'text/html');

      const container = doc.querySelector('.container');
      const metaCount = doc.querySelector('.meta-count');
      const metaTime  = doc.querySelector('.meta-time');
      const dateBadge = doc.querySelector('.date-badge');
      const weekday   = dateBadge?.querySelector('.weekday')?.textContent || '';
      const fulldate  = dateBadge?.querySelector('.fulldate')?.textContent || iso;

      section.innerHTML = `
        <div class="news-section-header">
          <h2>📰 ${weekday} ${fulldate}</h2>
          ${metaCount ? metaCount.outerHTML : ''}
          ${metaTime  ? metaTime.outerHTML  : ''}
        </div>
        ${container ? container.innerHTML : '<p class="news-empty">Sin contenido disponible.</p>'}`;
    } catch(e) {
      section.innerHTML = '<p class="news-empty">No se pudo cargar el contenido.</p>';
    }
  }

  async function renderWeek() {
    const cal   = document.getElementById('calendar');
    const label = document.getElementById('week-label');

    const wEnd = new Date(currentMonday); wEnd.setDate(wEnd.getDate() + 6);
    const sameMonth = currentMonday.getMonth() === wEnd.getMonth();
    label.textContent = sameMonth
      ? `${currentMonday.getDate()} – ${wEnd.getDate()} ${MONTHS_FULL[wEnd.getMonth()]} ${wEnd.getFullYear()}`
      : `${currentMonday.getDate()} ${MONTHS_ES[currentMonday.getMonth()]} – ${wEnd.getDate()} ${MONTHS_ES[wEnd.getMonth()]} ${wEnd.getFullYear()}`;

    // Disable prev at minimum week
    const prevMonday = new Date(currentMonday); prevMonday.setDate(prevMonday.getDate() - 7);
    document.getElementById('btn-prev').disabled = prevMonday < weekStart(MIN_DATE);
    // Disable next if current week contains today
    const nextMonday = new Date(currentMonday); nextMonday.setDate(nextMonday.getDate() + 7);
    document.getElementById('btn-next').disabled = nextMonday > today;

    // Build 7 skeleton cards
    cal.innerHTML = '';
    const cards = [];
    for (let i = 0; i < 7; i++) {
      const d = new Date(currentMonday); d.setDate(d.getDate() + i);
      const iso       = toISO(d);
      const isFuture  = d > today;
      const isToday   = iso === todayISO;
      const isWeekend = d.getDay() === 0 || d.getDay() === 6;

      const card = document.createElement('div');
      card.className = 'day-card'
        + (isToday   ? ' is-today'   : '')
        + (isFuture  ? ' is-future'  : '')
        + (isWeekend && !isToday ? ' is-weekend' : '');
      card.dataset.iso = iso;

      card.innerHTML = `
        <div class="day-name">${DAYS_ES[d.getDay()]}</div>
        <div class="day-num">${pad(d.getDate())}</div>
        <div class="day-month">${MONTHS_ES[d.getMonth()]} ${d.getFullYear()}</div>
        <div class="day-status">
          ${isFuture
            ? '<span class="status-future">Próx.</span>'
            : '<span class="spinner"></span>'}
        </div>`;
      cal.appendChild(card);
      cards.push({ card, iso, isFuture, d });
    }

    // Async check each past/today day
    let mostRecentISO = null;
    await Promise.all(cards.map(async ({ card, iso, isFuture }) => {
      if (isFuture) return;
      const hasNews = await checkDay(iso);
      const statusEl = card.querySelector('.day-status');
      if (hasNews) {
        card.classList.add('has-news');
        statusEl.innerHTML = '<span class="status-news">Ver →</span>';
        card.onclick = () => loadNews(iso);
        if (!mostRecentISO || iso > mostRecentISO) mostRecentISO = iso;
      } else {
        statusEl.innerHTML = '<span class="status-empty">—</span>';
      }
    }));

    // Auto-load most recent day's news (or keep active if still visible)
    if (activeISO && cards.some(c => c.iso === activeISO)) {
      // re-highlight current active
      const ac = document.querySelector(`[data-iso="${activeISO}"]`);
      if (ac) ac.classList.add('is-active');
    } else if (mostRecentISO) {
      loadNews(mostRecentISO);
    } else {
      document.getElementById('news-section').innerHTML =
        '<p class="news-empty">Sin noticias publicadas esta semana.</p>';
    }
  }

  renderWeek();
</script>
</body>
</html>
